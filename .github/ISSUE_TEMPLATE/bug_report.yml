name: Bug Report
description: Report a reproducible problem with the package.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue. Please include enough detail to reproduce the problem.
  - type: input
    id: environment
    attributes:
      label: Environment
      description: ROS 2 distro, Ubuntu version, and whether you are using mock or real hardware.
      placeholder: ROS 2 Humble on Ubuntu 22.04, use_mock:=true
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the observed behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the exact commands or actions required to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste the most relevant error output or attach screenshots if useful.
